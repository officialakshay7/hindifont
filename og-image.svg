<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0C0A"/>
      <stop offset="60%" stop-color="#1A1916"/>
      <stop offset="100%" stop-color="#2C2A26"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#gold)"/>
  <text x="116" y="133" font-family="serif" font-size="44" font-weight="700" fill="white" text-anchor="middle">अ</text>
  
  <!-- Brand name -->
  <text x="172" y="106" font-family="Georgia,serif" font-size="28" font-weight="700" fill="white">HindiFont</text>
  <text x="172" y="136" font-family="Georgia,serif" font-size="20" font-weight="400" fill="#F59E0B">.co.in</text>
  
  <!-- Badge -->
  <rect x="80" y="200" width="240" height="32" rx="16" fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>
  <circle cx="101" cy="216" r="5" fill="#D97706"/>
  <text x="116" y="221" font-family="sans-serif" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1">INDIA'S #1 HINDI FONT SITE</text>
  
  <!-- Main heading -->
  <text x="80" y="300" font-family="Georgia,serif" font-size="56" font-weight="900" fill="white">500+ Free</text>
  <text x="80" y="370" font-family="Georgia,serif" font-size="56" font-weight="900" fill="#F59E0B" font-style="italic">Hindi Fonts</text>
  <text x="80" y="440" font-family="Georgia,serif" font-size="56" font-weight="900" fill="white">Download करें</text>
  
  <!-- Sub text -->
  <text x="80" y="500" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">Kruti Dev · Devlys · Mangal · Noto Sans · Hind · और भी बहुत कुछ</text>
  <text x="80" y="535" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">No registration · Instant download · 100% Free</text>
  
  <!-- Right side Devanagari decoration -->
  <text x="820" y="480" font-family="serif" font-size="280" font-weight="700" fill="rgba(255,255,255,0.04)" text-anchor="middle">अ</text>
  
  <!-- Font examples on right -->
  <text x="780" y="180" font-family="serif" font-size="52" fill="rgba(255,255,255,0.12)">क ख ग</text>
  <text x="780" y="260" font-family="serif" font-size="52" fill="rgba(255,255,255,0.08)">घ च छ</text>
  <text x="780" y="340" font-family="serif" font-size="52" fill="rgba(255,255,255,0.05)">ज झ ट</text>
  
  <!-- Stats row -->
  <rect x="80" y="568" width="1040" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="600" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white">500+</text>
  <text x="80" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">FONTS</text>
  <text x="200" y="600" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white">100%</text>
  <text x="200" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">FREE</text>
  <text x="320" y="600" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white">0</text>
  <text x="320" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">REGISTRATION</text>
</svg>